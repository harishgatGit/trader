version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trader_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_pass
      POSTGRES_DB: trader_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trader -d trader_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trader_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trader_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://trader:trader_pass@postgres:5432/trader_db
      REDIS_URL: redis://redis:6379
      VIDEO_SERVICE_URL: http://video-agents:8090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trader_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend

  video-agents:
    build:
      context: ./video_agents_service
      dockerfile: Dockerfile
    container_name: trader_video_agents
    restart: unless-stopped
    ports:
      - '8090:8090'
    env_file:
      - .env
    volumes:
      - ./video_agents_service/outputs:/outputs


volumes:
  postgres_data:
  redis_data:

